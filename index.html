<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Мой трекер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--card:#fff;--card2:#f9f9fb;
  --text:#1a1a1a;--muted:#888;--border:#e8e8ed;
  --green:#16a34a;--green-bg:#f0fdf4;--green-light:#dcfce7;
  --red:#dc2626;--red-bg:#fef2f2;
  --blue:#1d4ed8;--blue-bg:#eff6ff;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --orange:#ea580c;--orange-bg:#fff7ed;
  --accent:#1a1a1a;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--accent);color:#fff;padding:20px 16px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.logo span{opacity:.5;font-weight:400}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.12);border-radius:10px;padding:3px}
.tab{flex:1;padding:6px 14px;border:none;border-radius:8px;background:transparent;color:rgba(255,255,255,.65);font-size:13px;cursor:pointer;transition:all .15s}
.tab.active{background:#fff;color:var(--accent);font-weight:500}

.week-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border)}
.week-label{font-size:13px;font-weight:500;color:var(--text)}
.nav-btn{border:1px solid var(--border);border-radius:8px;background:#fff;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text)}
.today-chip{border:1px solid var(--border);border-radius:20px;background:#fff;padding:3px 10px;font-size:12px;cursor:pointer;color:var(--muted)}

.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-item{background:#fff;padding:10px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

main{padding:12px 12px 80px}

.day-card{background:var(--card);border-radius:16px;margin-bottom:10px;overflow:hidden;border:1.5px solid transparent;transition:border-color .2s}
.day-card.today{border-color:var(--accent)}
.day-card.counted{border-color:var(--green)}

.day-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--card2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.day-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.day-name{font-size:14px;font-weight:600}
.day-date{font-size:13px;color:var(--muted)}
.chip{font-size:10px;font-weight:600;border-radius:6px;padding:2px 7px;letter-spacing:.2px}
.chip-today{background:#1a1a1a;color:#fff}
.chip-ok{background:var(--green-light);color:var(--green)}
.chip-fail{background:var(--red-bg);color:var(--red)}
.collapse-icon{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.day-card.open .collapse-icon{transform:rotate(180deg)}

.day-body{display:none;padding:12px 14px;flex-direction:column;gap:10px}
.day-card.open .day-body{display:flex}

.block-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.block-label.b1{color:var(--blue)}
.block-label.b2{color:var(--purple)}
.block-label.b3{color:var(--orange)}
.block-label.b4{color:var(--green)}

.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fields-row.triple{grid-template-columns:1fr 1fr 1fr}

.field{background:var(--bg);border-radius:10px;padding:9px 11px}
.field-lbl{font-size:11px;color:var(--muted);margin-bottom:5px}

.toggle-wrap{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.toggle-icon{font-size:15px}
.toggle{width:36px;height:20px;border-radius:10px;background:#ddd;position:relative;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle-knob{position:absolute;top:3px;width:14px;height:14px;border-radius:7px;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-knob{left:19px}
.toggle.off .toggle-knob{left:3px}

.num-input{width:100%;border:none;background:transparent;font-size:16px;font-weight:600;color:var(--text);outline:none;padding:0;-moz-appearance:textfield}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none}

.itog-block{background:var(--green-bg);border-radius:10px;padding:10px 12px;border:1px solid var(--green-light);cursor:pointer}
.itog-block.uncounted{background:var(--red-bg);border-color:#fca5a5}
.itog-toggle{display:flex;align-items:center;justify-content:space-between}
.itog-text{font-size:13px;font-weight:600;color:var(--green)}
.itog-block.uncounted .itog-text{color:var(--red)}

.alert{background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:11px 14px;margin-bottom:10px;font-size:13px;color:#856404;font-weight:500;display:flex;gap:8px;align-items:flex-start}

.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;font-size:12px;background:#fff;border-bottom:1px solid var(--border);color:var(--muted)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.month-week{background:var(--card);border-radius:14px;margin-bottom:8px;padding:14px}
.month-week-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.month-week-title{font-size:13px;font-weight:600}
.month-week-score{font-size:13px;font-weight:700}
.score-good{color:var(--green)}.score-mid{color:var(--orange)}.score-low{color:var(--red)}
.progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.fill-good{background:var(--green)}.fill-mid{background:var(--orange)}.fill-low{background:var(--red)}
.month-meta{display:flex;gap:16px;flex-wrap:wrap}
.month-meta span{font-size:12px;color:var(--muted)}
.month-meta b{color:var(--text)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:8px 16px;font-size:11px;color:var(--muted);text-align:center}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Мой трекер <span>/ действия</span></div>
    <div class="tabs">
      <button class="tab active" id="tab-week" onclick="switchView('week')">Неделя</button>
      <button class="tab" id="tab-month" onclick="switchView('month')">Месяц</button>
    </div>
  </div>
</div>

<div id="sync-bar" class="sync-bar">
  <div class="sync-dot loading" id="sync-dot"></div>
  <span id="sync-text">Загрузка данных...</span>
</div>

<div id="view-week"></div>
<div id="view-month" style="display:none"></div>
<div class="footer">Данные сохраняются в Google Sheets</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwUAJ_tgowB7_0pvuVeNHafwWaGlj_YRNHa5YXCTjNPMnYx0PAmGElzw_g1M94kSqgIEQ/exec';
const MONTHS=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

let monday=getMonday(new Date());
let view='week';
let openDays=new Set();
let allData={};
let syncStatus='loading'; // 'ok' | 'err' | 'loading'
let pendingQueue=[];
let isSending=false;

function getMonday(d){
  const r=new Date(d);const day=r.getDay();
  r.setDate(r.getDate()+(day===0?-6:1-day));r.setHours(0,0,0,0);return r;
}
function dk(d){return d.toISOString().slice(0,10)}
function fmtDate(d){return d.getDate()+' '+MONTHS[d.getMonth()]}
function weekDays(m){return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d})}
function defEntry(){return{post:false,stories:false,mailing:false,activity:'',incoming:'',regs:'',sales:'',counted:false}}
function getEntry(k){return Object.assign(defEntry(),allData[k]||{})}

function setSyncStatus(s,msg){
  syncStatus=s;
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(!dot) return;
  dot.className='sync-dot '+s;
  txt.textContent=msg;
}

async function loadAll(){
  setSyncStatus('loading','Загрузка данных...');
  try{
    const r=await fetch(API+'?action=getAll',{redirect:'follow'});
    const json=await r.json();
    allData=json||{};
    setSyncStatus('ok','Синхронизировано с Google Sheets');
    render();
  }catch(e){
    setSyncStatus('err','Ошибка загрузки — проверь интернет');
    render();
  }
}

function setField(k,field,val){
  allData[k]=Object.assign(defEntry(),allData[k]||{},{[field]:val});
  render();
  pendingQueue.push({date:k,field,value:String(val)});
  procesQueue();
}

async function procesQueue(){
  if(isSending||pendingQueue.length===0) return;
  isSending=true;
  setSyncStatus('loading','Сохранение...');
  while(pendingQueue.length>0){
    const item=pendingQueue.shift();
    try{
      const url=`${API}?action=set&date=${item.date}&field=${item.field}&value=${encodeURIComponent(item.value)}`;
      await fetch(url,{redirect:'follow'});
    }catch(e){
      pendingQueue.unshift(item);
      setSyncStatus('err','Ошибка сохранения — повтор через 5 сек');
      isSending=false;
      setTimeout(procesQueue,5000);
      return;
    }
  }
  isSending=false;
  setSyncStatus('ok','Сохранено в Google Sheets ✓');
}

function switchView(v){
  view=v;
  document.getElementById('tab-week').className='tab'+(v==='week'?' active':'');
  document.getElementById('tab-month').className='tab'+(v==='month'?' active':'');
  document.getElementById('view-week').style.display=v==='week'?'':'none';
  document.getElementById('view-month').style.display=v==='month'?'':'none';
  render();
}

function toggleDay(k){openDays.has(k)?openDays.delete(k):openDays.add(k);render()}
function prevWeek(){monday.setDate(monday.getDate()-7);render()}
function nextWeek(){monday.setDate(monday.getDate()+7);render()}
function goToday(){monday=getMonday(new Date());render()}

function checkTrigger(){
  const keys=Object.keys(allData).sort();let streak=0;
  for(const k of keys){
    const e=allData[k];const hasAny=e.post||e.stories||e.mailing||e.activity||e.incoming;
    if(hasAny&&(parseInt(e.activity)||0)+(parseInt(e.incoming)||0)<3) streak++;
    else streak=0;
    if(streak>=2) return true;
  }
  return false;
}

function render(){view==='week'?renderWeek():renderMonth()}

function renderWeek(){
  const days=weekDays(monday);const todayKey=dk(new Date());const trigger=checkTrigger();
  const entries=days.map(d=>getEntry(dk(d)));
  const counted=entries.filter(e=>e.counted).length;
  const totD=entries.reduce((s,e)=>s+(parseInt(e.activity)||0)+(parseInt(e.incoming)||0),0);
  const totRegs=entries.reduce((s,e)=>s+(parseInt(e.regs)||0),0);
  const totSales=entries.reduce((s,e)=>s+(parseInt(e.sales)||0),0);

  let h=`<div class="week-nav">
    <button class="nav-btn" onclick="prevWeek()">←</button>
    <span class="week-label">${fmtDate(days[0])} — ${fmtDate(days[6])}</span>
    <button class="today-chip" onclick="goToday()">Сегодня</button>
    <button class="nav-btn" onclick="nextWeek()">→</button>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val">${counted}/7</div><div class="stat-lbl">Дней засчит.</div></div>
    <div class="stat-item"><div class="stat-val">${totD}</div><div class="stat-lbl">Диалогов</div></div>
    <div class="stat-item"><div class="stat-val">${totRegs}/${totSales}</div><div class="stat-lbl">Рег / Продажи</div></div>
  </div><main>`;

  if(trigger) h+=`<div class="alert">⚠️ 2 дня подряд мало диалогов — сегодня напиши 10 исходящих!</div>`;

  days.forEach((d,i)=>{
    const key=dk(d);const e=getEntry(key);
    const isToday=key===todayKey;const isOpen=openDays.has(key)||isToday;
    const hasAny=e.post||e.stories||e.mailing||e.activity||e.incoming||e.regs||e.sales||e.counted;
    let chips='';
    if(isToday) chips+=`<span class="chip chip-today">сегодня</span>`;
    if(hasAny) chips+=e.counted?`<span class="chip chip-ok">✔ Засчитан</span>`:`<span class="chip chip-fail">✖ Не засчитан</span>`;

    h+=`<div class="day-card${isToday?' today':''}${e.counted?' counted':''}${isOpen?' open':''}">
      <div class="day-header" onclick="toggleDay('${key}')">
        <div class="day-header-left">
          <span class="day-name">${DAYS[i]}</span>
          <span class="day-date">${fmtDate(d)}</span>
          ${chips}
        </div>
        <span class="collapse-icon">▼</span>
      </div>
      <div class="day-body">
        <div>
          <div class="block-label b1">Блок 1 — Контент</div>
          <div class="fields-row triple">
            <div class="field"><div class="field-lbl">Пост</div>
              <div class="toggle-wrap" onclick="setField('${key}','post',${!e.post})">
                <span class="toggle-icon">${e.post?'✔':'✖'}</span>
                <div class="toggle ${e.post?'on':'off'}"><div class="toggle-knob"></div></div>
              </div></div>
            <div class="field"><div class="field-lbl">Сторис</div>
              <div class="toggle-wrap" onclick="setField('${key}','stories',${!e.stories})">
                <span class="toggle-icon">${e.stories?'✔':'✖'}</span>
                <div class="toggle ${e.stories?'on':'off'}"><div class="toggle-knob"></div></div>
              </div></div>
            <div class="field"><div class="field-lbl">Рассылки</div>
              <div class="toggle-wrap" onclick="setField('${key}','mailing',${!e.mailing})">
                <span class="toggle-icon">${e.mailing?'✔':'✖'}</span>
                <div class="toggle ${e.mailing?'on':'off'}"><div class="toggle-knob"></div></div>
              </div></div>
          </div>
        </div>
        <div>
          <div class="block-label b2">Блок 2 — Диалоги</div>
          <div class="fields-row">
            <div class="field"><div class="field-lbl">Отработка активности</div>
              <input class="num-input" type="number" min="0" placeholder="0" value="${e.activity}"
                oninput="setField('${key}','activity',this.value)"/></div>
            <div class="field"><div class="field-lbl">Входящие заявки</div>
              <input class="num-input" type="number" min="0" placeholder="0" value="${e.incoming}"
                oninput="setField('${key}','incoming',this.value)"/></div>
          </div>
        </div>
        <div>
          <div class="block-label b3">Блок 3 — Продажи</div>
          <div class="fields-row">
            <div class="field"><div class="field-lbl">Регистрации</div>
              <input class="num-input" type="number" min="0" placeholder="0" value="${e.regs}"
                oninput="setField('${key}','regs',this.value)"/></div>
            <div class="field"><div class="field-lbl">Продажи</div>
              <input class="num-input" type="number" min="0" placeholder="0" value="${e.sales}"
                oninput="setField('${key}','sales',this.value)"/></div>
          </div>
        </div>
        <div>
          <div class="block-label b4">Блок 4 — Итог</div>
          <div class="itog-block${e.counted?'':' uncounted'}" onclick="setField('${key}','counted',${!e.counted})">
            <div class="itog-toggle">
              <span class="itog-text">${e.counted?'✔ День засчитан':'✖ День не засчитан'}</span>
              <div class="toggle ${e.counted?'on':'off'}"><div class="toggle-knob"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  });
  h+='</main>';
  document.getElementById('view-week').innerHTML=h;
}

function renderMonth(){
  const weeks={};
  Object.keys(allData).sort().forEach(key=>{
    const d=new Date(key);const m=getMonday(d);const mk=dk(m);
    if(!weeks[mk]) weeks[mk]={monday:m,days:[]};
    weeks[mk].days.push({key,e:allData[key]});
  });
  const rows=Object.values(weeks).sort((a,b)=>a.monday-b.monday);
  const totC=rows.reduce((s,w)=>s+w.days.filter(d=>d.e.counted).length,0);
  const totDay=rows.reduce((s,w)=>s+w.days.length,0);
  const totD=rows.reduce((s,w)=>s+w.days.reduce((ss,d)=>ss+(parseInt(d.e.activity)||0)+(parseInt(d.e.incoming)||0),0),0);
  const totR=rows.reduce((s,w)=>s+w.days.reduce((ss,d)=>ss+(parseInt(d.e.regs)||0),0),0);
  const totS=rows.reduce((s,w)=>s+w.days.reduce((ss,d)=>ss+(parseInt(d.e.sales)||0),0),0);

  let h=`<div class="stats-bar">
    <div class="stat-item"><div class="stat-val">${totC}/${totDay}</div><div class="stat-lbl">Засчитано</div></div>
    <div class="stat-item"><div class="stat-val">${totD}</div><div class="stat-lbl">Диалогов</div></div>
    <div class="stat-item"><div class="stat-val">${totR}/${totS}</div><div class="stat-lbl">Рег / Продажи</div></div>
  </div><main>`;

  if(!rows.length){h+=`<div class="empty">Данных пока нет.<br>Заполни хотя бы одну неделю.</div>`;h+='</main>';document.getElementById('view-month').innerHTML=h;return;}

  rows.forEach(w=>{
    const cnt=w.days.filter(d=>d.e.counted).length;const tot=w.days.length;
    const pct=tot?Math.round(cnt/tot*100):0;
    const cls=pct>=70?'good':pct>=40?'mid':'low';
    const end=new Date(w.monday);end.setDate(end.getDate()+6);
    const tD=w.days.reduce((s,d)=>s+(parseInt(d.e.activity)||0)+(parseInt(d.e.incoming)||0),0);
    const tR=w.days.reduce((s,d)=>s+(parseInt(d.e.regs)||0),0);
    const tS=w.days.reduce((s,d)=>s+(parseInt(d.e.sales)||0),0);
    h+=`<div class="month-week">
      <div class="month-week-head">
        <span class="month-week-title">${fmtDate(w.monday)} — ${fmtDate(end)}</span>
        <span class="month-week-score score-${cls}">${cnt}/${tot} дн.</span>
      </div>
      <div class="progress"><div class="progress-fill fill-${cls}" style="width:${pct}%"></div></div>
      <div class="month-meta">
        <span>Диалоги: <b>${tD}</b></span>
        <span>Регистрации: <b>${tR}</b></span>
        <span>Продажи: <b>${tS}</b></span>
      </div>
    </div>`;
  });
  h+='</main>';
  document.getElementById('view-month').innerHTML=h;
}

openDays.add(dk(new Date()));
loadAll();
</script>
</body>
</html>
